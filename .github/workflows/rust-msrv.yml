name: Compute minimum supported Rust version for this project

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  rust-msrv:
    name: Compute minimum supported Rust version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Compute minimum supported Rust version
        uses: spenserblack/actions-msrv@v0.4.1
        id: get-msrv

      - name: Output minimum supported Rust version
        run: 'echo "MSRV is ${{ steps.get-msrv.outputs.msrv }}"'
